<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Abilithic icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#202C3D"/>
      <stop offset="1" stop-color="#0C1118"/>
    </linearGradient>
    <linearGradient id="stone" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#F1F5FA"/>
      <stop offset="0.55" stop-color="#C3CCD9"/>
      <stop offset="1" stop-color="#97A3B4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#48F3D2"/>
      <stop offset="1" stop-color="#0FB497"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#48F3D2" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#48F3D2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- panel -->
  <rect x="4" y="4" width="248" height="248" rx="54" fill="url(#bg)"/>
  <rect x="4.5" y="4.5" width="247" height="247" rx="53.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="1"/>

  <!-- foundation line (stone base) -->
  <rect x="66" y="210" width="124" height="8" rx="4" fill="url(#accent)" opacity="0.95"/>

  <!-- monolith 'A' -->
  <polygon points="128,42 46,204 210,204" fill="url(#stone)" stroke="url(#stone)" stroke-width="14" stroke-linejoin="round"/>
  <!-- carved facets -->
  <polygon points="128,42 46,204 128,204" fill="#FFFFFF" fill-opacity="0.10"/>
  <polygon points="128,42 210,204 128,204" fill="#0A0E14" fill-opacity="0.16"/>

  <!-- keyhole -->
  <circle cx="128" cy="120" r="40" fill="url(#glow)"/>
  <circle cx="128" cy="117" r="19" fill="url(#accent)"/>
  <path d="M121 130 H135 L141 166 a3 3 0 0 1 -3 4 H116 a3 3 0 0 1 -3 -4 Z" fill="url(#accent)"/>
</svg>
